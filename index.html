<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>Kaviyarasu - Portfolio 2030</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #05070c;
    overflow: hidden;
    color: #f5f7fb;
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  canvas { outline: none; }

  #game-container {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, #0a1020 0%, #05070c 70%);
  }
  #game-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ---------- LOADING SCREEN ---------- */
  #loader {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #101830 0%, #05070c 80%);
    z-index: 500;
    transition: opacity 600ms ease;
    gap: 22px;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }
  #loader-title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 8px;
    color: #7cc7ff;
    text-shadow: 0 0 18px rgba(124,199,255,0.5);
  }
  #loader-sub {
    font-size: 12px;
    color: #96a0b5;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  #loader-bar {
    width: min(320px, 60vw);
    height: 3px;
    background: rgba(124,199,255,0.12);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  #loader-bar-fill {
    position: absolute;
    inset: 0 auto 0 0;
    width: 0%;
    background: linear-gradient(90deg, #7cc7ff, #b48cff);
    box-shadow: 0 0 12px rgba(124,199,255,0.7);
    transition: width 180ms ease-out;
  }
  #loader-hint { font-size: 10px; color: #5a6577; letter-spacing: 2px; }

  /* ---------- HUD ---------- */
  #hud-zone {
    position: fixed;
    top: 22px;
    left: 50%;
    transform: translateX(-50%) translateY(-12px);
    opacity: 0;
    transition: opacity 220ms ease, transform 220ms ease;
    padding: 10px 18px;
    background: rgba(10,16,32,0.55);
    backdrop-filter: blur(14px) saturate(160%);
    -webkit-backdrop-filter: blur(14px) saturate(160%);
    border: 1px solid rgba(124,199,255,0.25);
    border-radius: 999px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 3px;
    color: #dceaff;
    text-transform: uppercase;
    box-shadow: 0 10px 36px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.03) inset;
    pointer-events: none;
    z-index: 20;
  }
  #hud-zone.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

  #crosshair {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 6px;
    height: 6px;
    margin: -3px 0 0 -3px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    box-shadow: 0 0 10px rgba(255,255,255,0.35);
    pointer-events: none;
    z-index: 8;
    opacity: 0.0;
    transition: opacity 200ms ease;
  }
  #crosshair.visible { opacity: 0.6; }

  #prompt {
    position: fixed;
    top: calc(50% + 38px);
    left: 50%;
    transform: translateX(-50%) scale(0.95);
    padding: 8px 14px 8px 10px;
    background: rgba(10,16,32,0.72);
    backdrop-filter: blur(18px) saturate(170%);
    -webkit-backdrop-filter: blur(18px) saturate(170%);
    border: 1px solid rgba(180,140,255,0.35);
    border-radius: 10px;
    font-size: 13px;
    color: #f5f7fb;
    pointer-events: none;
    z-index: 9;
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0;
    transition: opacity 160ms ease, transform 160ms ease;
    white-space: nowrap;
  }
  #prompt.visible { opacity: 1; transform: translateX(-50%) scale(1); }
  #prompt .key {
    display: inline-block;
    min-width: 26px;
    padding: 3px 8px;
    background: linear-gradient(180deg, #b48cff, #7a5ae0);
    border-radius: 6px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 11px;
    color: #fff;
    text-align: center;
    box-shadow: 0 2px 8px rgba(124,90,224,0.6);
  }

  #help {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: rgba(200,210,230,0.55);
    letter-spacing: 1px;
    z-index: 3;
    pointer-events: none;
    white-space: nowrap;
  }
  #help .k {
    display: inline-block;
    padding: 2px 6px;
    margin: 0 2px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 4px;
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    color: #dceaff;
  }
  @media (max-width: 800px) { #help { display: none; } }

  #minimap {
    position: fixed;
    top: 22px;
    right: 22px;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    overflow: hidden;
    background: rgba(10,16,32,0.55);
    backdrop-filter: blur(16px) saturate(160%);
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    border: 1px solid rgba(124,199,255,0.25);
    box-shadow: 0 10px 36px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
    z-index: 6;
  }
  #minimap canvas { width: 100%; height: 100%; display: block; }
  @media (max-width: 800px) {
    #minimap { width: 110px; height: 110px; top: 14px; right: 14px; }
  }

  /* ---------- TOAST ---------- */
  #toast {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.92);
    padding: 18px 26px;
    background: rgba(10,16,32,0.8);
    backdrop-filter: blur(20px) saturate(170%);
    -webkit-backdrop-filter: blur(20px) saturate(170%);
    border: 1px solid rgba(180,140,255,0.45);
    border-radius: 14px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 2px;
    color: #f5f7fb;
    text-transform: uppercase;
    box-shadow: 0 18px 50px rgba(0,0,0,0.55), 0 0 32px rgba(180,140,255,0.25);
    opacity: 0;
    pointer-events: none;
    z-index: 50;
    transition: opacity 220ms ease, transform 220ms ease;
  }
  #toast.visible { opacity: 1; transform: translate(-50%, -50%) scale(1); }

  /* ---------- DIALOGUE MODAL ---------- */
  #dialogue {
    position: fixed;
    left: 50%;
    bottom: 36px;
    transform: translateX(-50%) translateY(14px);
    width: min(920px, calc(100% - 40px));
    max-height: 58vh;
    padding: 24px 28px 22px;
    background: rgba(10,16,32,0.78);
    backdrop-filter: blur(26px) saturate(160%);
    -webkit-backdrop-filter: blur(26px) saturate(160%);
    border: 1px solid rgba(124,199,255,0.3);
    border-radius: 20px;
    color: #eef2ff;
    font-size: 14.5px;
    line-height: 1.6;
    box-shadow:
      0 24px 80px rgba(0,0,0,0.55),
      0 0 0 1px rgba(255,255,255,0.04) inset,
      0 -1px 0 rgba(255,255,255,0.08) inset;
    overflow-y: auto;
    opacity: 0;
    pointer-events: none;
    transition: opacity 260ms ease, transform 260ms cubic-bezier(.2,.9,.3,1.1);
    z-index: 40;
  }
  #dialogue.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
  }
  #dialogue::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    pointer-events: none;
    background: linear-gradient(180deg, rgba(124,199,255,0.12), transparent 40%);
  }
  #dialogue h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 3px;
    color: #dceaff;
    margin-bottom: 14px;
    text-transform: uppercase;
    text-shadow: 0 0 22px rgba(124,199,255,0.35);
  }
  #dialogue h2 .accent {
    background: linear-gradient(90deg, #7cc7ff, #b48cff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  #dialogue p { margin-bottom: 10px; }
  #dialogue strong { color: #dceaff; font-weight: 700; }
  #dialogue em  { color: #b48cff; font-style: normal; font-weight: 600; }
  #dialogue a {
    color: #7cc7ff;
    text-decoration: none;
    border-bottom: 1px solid rgba(124,199,255,0.4);
    pointer-events: auto;
    transition: color 140ms ease, border-color 140ms ease;
  }
  #dialogue a:hover { color: #b48cff; border-bottom-color: #b48cff; }

  #dialogue .row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 4px 0;
    font-size: 13px;
  }
  #dialogue .label {
    display: inline-block;
    min-width: 64px;
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: #96a0b5;
    text-transform: uppercase;
  }
  #dialogue .bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 6px 0;
  }
  #dialogue .bar .name {
    flex: 0 0 auto;
    min-width: 180px;
    font-size: 13px;
    color: #dceaff;
    font-weight: 500;
  }
  #dialogue .bar .meter {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  #dialogue .bar .meter::after {
    content: '';
    position: absolute;
    inset: 0 auto 0 0;
    width: var(--pct, 0%);
    background: linear-gradient(90deg, #7cc7ff, #b48cff);
    border-radius: 3px;
    box-shadow: 0 0 10px rgba(124,199,255,0.5);
  }
  #dialogue .bar .pct {
    flex: 0 0 44px;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    color: #7cc7ff;
    text-align: right;
  }

  #dialogue .chip {
    display: inline-block;
    padding: 3px 9px;
    margin: 2px 4px 2px 0;
    font-size: 11px;
    letter-spacing: 0.5px;
    background: rgba(124,199,255,0.08);
    border: 1px solid rgba(124,199,255,0.25);
    border-radius: 999px;
    color: #dceaff;
  }
  #dialogue .chip.pro { background: rgba(180,140,255,0.1); border-color: rgba(180,140,255,0.35); color: #e6d4ff; }

  #dialogue .entry {
    padding: 12px 14px;
    margin: 10px 0;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    border-left: 2px solid #7cc7ff;
  }
  #dialogue .entry.pro { border-left-color: #b48cff; }
  #dialogue .entry h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    letter-spacing: 1.2px;
    color: #f5f7fb;
    margin-bottom: 4px;
  }
  #dialogue .entry .period {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    color: #96a0b5;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
  }
  #dialogue .entry ul { margin: 6px 0 0 18px; font-size: 13.5px; color: #c9d3e7; }
  #dialogue .entry li { margin-bottom: 4px; }

  #dialogue .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-top: 14px;
  }
  #dialogue .metric {
    padding: 14px;
    background: linear-gradient(160deg, rgba(124,199,255,0.08), rgba(180,140,255,0.05));
    border: 1px solid rgba(124,199,255,0.2);
    border-radius: 12px;
  }
  #dialogue .metric .num {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 24px;
    background: linear-gradient(90deg, #7cc7ff, #b48cff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  #dialogue .metric .caption {
    font-size: 11px;
    letter-spacing: 1px;
    color: #96a0b5;
    text-transform: uppercase;
    margin-top: 2px;
  }

  #dialogue .hint-close {
    position: sticky;
    bottom: -22px;
    margin-top: 16px;
    padding: 8px 0 0;
    text-align: center;
    font-size: 11px;
    letter-spacing: 2px;
    color: #7a8499;
    text-transform: uppercase;
    background: linear-gradient(180deg, transparent, rgba(10,16,32,0.85) 40%);
  }

  #dialogue::-webkit-scrollbar { width: 6px; }
  #dialogue::-webkit-scrollbar-track { background: transparent; }
  #dialogue::-webkit-scrollbar-thumb {
    background: rgba(124,199,255,0.3);
    border-radius: 3px;
  }

  @media (max-width: 800px) {
    #dialogue {
      bottom: auto;
      top: 14px;
      width: calc(100% - 20px);
      max-height: 56vh;
      padding: 18px 18px 14px;
      font-size: 13.5px;
    }
    #dialogue h2 { font-size: 15px; }
    #dialogue .bar .name { min-width: 130px; font-size: 12px; }
  }

  /* ---------- TOUCH CONTROLS ---------- */
  .controls { position: fixed; display: none; touch-action: none; z-index: 30; user-select: none; }
  .controls.active { display: block; }

  #joystick {
    left: 24px;
    bottom: 24px;
    width: 140px;
    height: 140px;
  }
  #joystick .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: rgba(10,16,32,0.45);
    backdrop-filter: blur(12px) saturate(160%);
    -webkit-backdrop-filter: blur(12px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  #joystick .knob {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 58px;
    height: 58px;
    margin: -29px 0 0 -29px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #b9cfff, #7cc7ff 60%, #4c77c4);
    box-shadow: 0 4px 14px rgba(0,0,0,0.45), 0 0 20px rgba(124,199,255,0.45);
    transition: transform 60ms linear;
    pointer-events: none;
  }

  #look-pad {
    right: 0; top: 0;
    width: 50%;
    height: 100%;
    background: transparent;
    z-index: 25;
  }

  #action-btn {
    right: 24px;
    bottom: 44px;
  }
  #action-btn button {
    width: 86px;
    height: 86px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #d2baff, #b48cff 55%, #6b4cc0);
    border: 2px solid rgba(255,255,255,0.25);
    color: #1a0f40;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 13px;
    letter-spacing: 2px;
    box-shadow: 0 8px 24px rgba(107,76,192,0.55), 0 0 24px rgba(180,140,255,0.35);
    touch-action: none;
    cursor: pointer;
  }
  #action-btn button:active { transform: scale(0.94); }

  #run-btn {
    right: 36px;
    bottom: 150px;
  }
  #run-btn button {
    width: 62px;
    height: 62px;
    border-radius: 50%;
    background: rgba(10,16,32,0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(124,199,255,0.35);
    color: #7cc7ff;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 1.5px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.4);
    touch-action: none;
    cursor: pointer;
  }
  #run-btn button.on { background: rgba(124,199,255,0.3); color: #fff; }
  #run-btn button:active { transform: scale(0.92); }

  @media (max-width: 800px) {
    #help { display: none; }
    #prompt { top: calc(50% + 46px); font-size: 12px; }
  }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="game-canvas"></canvas>
</div>

<div id="crosshair"></div>
<div id="hud-zone"></div>
<div id="prompt"></div>
<div id="minimap"><canvas width="160" height="160"></canvas></div>
<div id="toast"></div>
<div id="dialogue"></div>
<div id="help">
  <span class="k">WASD</span> move
  &nbsp;·&nbsp; <span class="k">Mouse</span> look
  &nbsp;·&nbsp; <span class="k">Wheel</span> zoom
  &nbsp;·&nbsp; <span class="k">Shift</span> sprint
  &nbsp;·&nbsp; <span class="k">E</span> interact
  &nbsp;·&nbsp; <span class="k">T</span> time
  &nbsp;·&nbsp; <span class="k">Esc</span> close
</div>

<div class="controls" id="joystick">
  <div class="ring"></div>
  <div class="knob"></div>
</div>
<div class="controls" id="look-pad"></div>
<div class="controls" id="action-btn"><button aria-label="Interact">ACT</button></div>
<div class="controls" id="run-btn"><button aria-label="Sprint">RUN</button></div>

<div id="loader">
  <div id="loader-title">KAVIYARASU</div>
  <div id="loader-sub">PORTFOLIO · 2030 EDITION</div>
  <div id="loader-bar"><div id="loader-bar-fill"></div></div>
  <div id="loader-hint">Assembling island…</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/shaders/FXAAShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="./dist/bundle.js"></script>
</body>
</html>
